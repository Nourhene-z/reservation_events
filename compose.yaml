services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event_php
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DATABASE_URL: "mysql://root:@host.docker.internal:3306/mini_event_db?charset=utf8mb4"
      JWT_SECRET: "change_this_secret_in_prod_please_use_at_least_32_chars_123456"
      JWT_TTL: 3600
      PASSKEY_RP_ID: "127.0.0.1"
      PASSKEY_RP_NAME: "Event Reservation"
      PASSKEY_CHALLENGE_TTL: 300
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/var/www

  nginx:
    image: nginx:1.27-alpine
    container_name: event_nginx
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
