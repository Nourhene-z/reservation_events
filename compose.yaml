services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event_php
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DATABASE_URL: "mysql://app:app@database:3306/mini_event_db?charset=utf8mb4"
      JWT_SECRET: "change_this_secret_in_prod_please_use_at_least_32_chars_123456"
      JWT_TTL: 3600
      PASSKEY_RP_ID: "127.0.0.1"
      PASSKEY_RP_NAME: "Event Reservation"
      PASSKEY_CHALLENGE_TTL: 300
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./:/var/www

  nginx:
    image: nginx:1.27-alpine
    container_name: event_nginx
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  database:
    image: mariadb:10.11
    container_name: event_db
    environment:
      MARIADB_DATABASE: mini_event_db
      MARIADB_USER: app
      MARIADB_PASSWORD: app
      MARIADB_ROOT_PASSWORD: root
    healthcheck:
      test:
        [
          "CMD",
          "mariadb-admin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-proot",
        ]
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - database_data:/var/lib/mysql

volumes:
  database_data:
